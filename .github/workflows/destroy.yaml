name: Destroy EKS and ArgoCD
on:
  workflow_dispatch:

jobs:
  destroy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::092568126647:role/GitHubActionsDeployRole
          aws-region: eu-west-1
          
      - name: Bootstrap Terraform state bucket
        env:
          STATE_BUCKET: "app-of-apps-tf-state-eu-west-1"
          STATE_TABLE: "app-of-apps-tf-lock-euw1"
          AWS_REGION: "eu-west-1"
        run: |
          set -euo pipefail
          if ! aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            aws s3api create-bucket \
              --bucket "$STATE_BUCKET" \
              --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION" \
              > /dev/null
            aws s3api put-bucket-versioning \
              --bucket "$STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$STATE_BUCKET" \
              --server-side-encryption-configuration \
                '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            echo "State bucket created."
          else
            echo "State bucket already exists."
          fi
          
          if ! aws dynamodb describe-table --table-name "$STATE_TABLE" 2>/dev/null; then
            echo "Creating DynamoDB table $STATE_TABLE..."
            aws dynamodb create-table \
              --table-name "$STATE_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION" > /dev/null
            aws dynamodb wait table-exists --table-name "$STATE_TABLE" --region "$AWS_REGION"
          else
            echo "DynamoDB table $STATE_TABLE already exists."
          fi
          
          cat <<BACKEND > backend.tf
          terraform {
            backend "s3" {
              bucket         = "$STATE_BUCKET"
              key            = "terraform.tfstate"
              region         = "$AWS_REGION"
              dynamodb_table = "$STATE_TABLE"
              encrypt        = true
            }
          }
          BACKEND

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
