name: Destroy EKS and ArgoCD
on:
  workflow_dispatch:

jobs:
  destroy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::092568126647:role/GitHubActionsDeployRole
          aws-region: eu-west-1
          
      - name: Bootstrap Terraform Backend
        env:
          TF_STATE_BUCKET: "app-of-apps-tf-state-eu-west-1"
          TF_STATE_TABLE: "app-of-apps-tf-lock-euw1"
          AWS_REGION: "eu-west-1"
        run: |
          BUCKET_NAME=$(echo "$TF_STATE_BUCKET" | tr '[:upper:]' '[:lower:]')
          
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Creating S3 bucket $BUCKET_NAME..."
            aws s3api create-bucket --bucket "$BUCKET_NAME" --region "$AWS_REGION" --create-bucket-configuration LocationConstraint="$AWS_REGION"
            aws s3api put-bucket-versioning --bucket "$BUCKET_NAME" --versioning-configuration Status=Enabled
          fi
          
          if ! aws dynamodb describe-table --table-name "$TF_STATE_TABLE" 2>/dev/null; then
            echo "Creating DynamoDB table $TF_STATE_TABLE..."
            aws dynamodb create-table \
              --table-name "$TF_STATE_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION"
            aws dynamodb wait table-exists --table-name "$TF_STATE_TABLE" --region "$AWS_REGION"
          fi
          
          cat <<BACKEND > backend.tf
          terraform {
            backend "s3" {
              bucket         = "$BUCKET_NAME"
              key            = "terraform.tfstate"
              region         = "$AWS_REGION"
              dynamodb_table = "$TF_STATE_TABLE"
              encrypt        = true
            }
          }
          BACKEND

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
